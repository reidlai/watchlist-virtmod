$schema: "https://moonrepo.dev/schemas/project.json"
id: "watchlist-sveltekit"
layer: "library"
stack: "frontend"

tasks:
  build:
    command: "svelte-package"
    outputs:
      - "dist/**"
    options:
      mergeArgs: "replace"

  dev:
    command: "vite dev"
    preset: "server"

  storybook:
    command: "pnpm run story:dev"
    preset: "server"
  sync:
    command: "svelte-kit sync"

  check:
    command: "svelte-check --tsconfig ./tsconfig.json"
    deps:
      - "sync"

  lint:
    command: "svelte-check --tsconfig ./tsconfig.json --output human"
    inputs:
      [
        "src/**/*",
        "!src/lib/api-client.ts",
        "!dist/**",
        "!storybook-static/**",
        "**/.*/**",
        "moon.yml",
      ]
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"
    deps:
      - "sync"

  test:
    command: "vitest run"
    toolchain: node
    options:
      mergeArgs: "replace"

  format:
    command: "prettier --write --ignore-path ../../../.prettierignore ."
    inputs:
      [
        "**/*",
        "!node_modules/**",
        "!dist/**",
        "!storybook-static/**",
        "**/.*/**",
      ]
    toolchain: node
    options:
      mergeArgs: "replace"
  zodios-gen:
    command: 'npx openapi-zod-client "../go/goa_gen/gen/http/openapi3.json" -o "./src/lib/api-client/index.ts"'
    deps:
      - "build"
