$schema: 'https://moonrepo.dev/schemas/project.json'
id: 'watchlist-go'
layer: 'library'
stack: 'backend'

tasks:
  build:
    command: 'go build ./...'
    inputs:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
    outputs: []
    options:
      mergeOutputs: 'replace'
      mergeArgs: 'replace'

  format:
    command: "goimports"
    args:
      - "-w"
      - "."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "!**/.*/**"
    toolchain: "system"
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  lint:
    command: "go"
    args:
      - "run"
      - "github.com/golangci/golangci-lint/cmd/golangci-lint@latest"
      - "run"
      - "-v"
      - "--allow-parallel-runners"
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "!**/.*/**"
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  test:
    command: "go test ./..."
    inputs:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    options:
      runInCI: true
      mergeArgs: "replace"

  goa-gen:
    command: "goa gen github.com/reidlai/ta-workspace/modules/watchlist/go/design --output goa_gen"
    inputs:
      - "design/**/*.go"
      - "go.mod"
    outputs:
      - "goa_gen/**"
    options:
      mergeArgs: "replace"
