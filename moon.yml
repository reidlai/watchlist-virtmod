# https://moonrepo.dev/docs/config/project
id: 'watchlist'
language: "unknown" # Mixed/Polyglot

fileGroups:
  go: ["go/**/*"]
  sveltekit: ["sveltekit/**/*", "!sveltekit/node_modules/**", "!sveltekit/dist/**", "**/.*/**"]

tasks:
  # Go Backend
  go-build:
    command: "go build -v ./go/..."
    inputs: ["go/**/*"]
    toolchain: "system"

  go-test:
    command: "go test -v ./go/..."
    inputs: ["go/**/*", "!go/goa_gen/**"]
    toolchain: "system"

  go-lint:
    deps: ["watchlist-go:lint"]
    toolchain: "system"
    options:
      mergeInputs: "replace"

  go-format:
    command: "goimports -w ./go"
    inputs: ["go/**/*"]
    options:
      mergeArgs: "replace"
      mergeInputs: "replace"

  # Svelte Frontend
  sveltekit-dev:
    deps: ["watchlist-sveltekit:dev"]
    preset: "server"
    toolchain: "node"

  sveltekit-build:
    deps: ["watchlist-sveltekit:build"]
    toolchain: "node"

  sveltekit-sync:
    deps: ["watchlist-sveltekit:sync"]
    toolchain: "node"
    preset: "server"
    options:
      runInCI: true
      persistent: false

  sveltekit-check:
    deps: ["watchlist-sveltekit:check"]
    toolchain: "node"

  sveltekit-test:
    deps: ["watchlist-sveltekit:test"]
    toolchain: "node"

  sveltekit-lint:
    deps: ["watchlist-sveltekit:lint"]
    toolchain: "system"
    options:
      mergeInputs: 'replace'

  sveltekit-format:
    deps: ["watchlist-sveltekit:format"]
    toolchain: "system"
    inputs: ["moon.yml"]
    options:
      mergeInputs: 'replace'

  # Composite Tasks
  build:
    command: 'echo "Building all components"'
    deps: ["go-build", "sveltekit-build"]
    outputs: []
    toolchain: "system"
    options:
      mergeArgs: 'replace'
      mergeInputs: 'replace'
      mergeOutputs: 'replace'

  test:
    command: 'echo "Testing all components"'
    deps: ["go-test", "sveltekit-test", "sveltekit-check"]
    toolchain: "system"
    options:
      mergeArgs: 'replace'

  lint:
    command: 'echo "Linting all components"'
    deps: ["go-lint", "sveltekit-lint"]
    toolchain: "system"
    inputs: ["moon.yml"]
    options:
      mergeArgs: 'replace'
      mergeInputs: 'replace'

  format:
    command: 'echo "Formatting all components"'
    deps: ["go-format", "sveltekit-format"]
    toolchain: "system"
    inputs: ["moon.yml"]
    options:
      mergeArgs: 'replace'
      mergeInputs: 'replace'

